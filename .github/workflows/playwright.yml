name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag to run (smoke / regression / e2e / all)'
        required: false
        default: 'smoke'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run smoke tests
        if: github.event.inputs.test_tag == '' || github.event.inputs.test_tag == 'smoke' || github.event_name == 'push' || github.event_name == 'pull_request'
        run: npx playwright test --grep @smoke
        env:
          CI: true

      - name: Run regression tests
        if: github.event.inputs.test_tag == 'regression' || github.event_name == 'schedule'
        run: npx playwright test --grep @regression
        env:
          CI: true

      - name: Run all tests
        if: github.event.inputs.test_tag == 'all'
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7

  publish-report:
    name: Publish Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Setup Java (required for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Restore Allure history from gh-pages
        run: |
          if git fetch origin gh-pages --depth=1 2>/dev/null; then
            git checkout origin/gh-pages -- history || echo "No history yet, starting fresh"
          else
            echo "gh-pages branch not found, starting fresh"
          fi

      - name: Generate Allure Report
        run: |
          if [ -d "history" ]; then
            cp -r history allure-results/history
          fi
          allure generate allure-results --clean -o allure-report

      - name: Copy history for next run
        run: cp -r allure-report/history history || true

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: false